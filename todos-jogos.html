<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confira os jogos mais populares e em destaque para Xbox">
    <title>Jogos em Destaque - Xbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        
        h1 {
            color: #107c10;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .jogos-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .jogo {
            width: 200px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .jogo:hover {
            transform: scale(1.05);
        }
        
        .jogo img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .jogo p {
            margin-top: 12px;
            font-weight: bold;
            color: #333;
        }
        
        .voltar {
            text-align: center;
            margin-top: 30px;
        }
        
        .voltar a {
            color: #107c10;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border: 1px solid #107c10;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .voltar a:hover {
            background-color: #107c10;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Jogos em Destaque no Xbox</h1>
    </header>
    
    <main>
        <section class="jogos-container">
            <article class="jogo">
                <img src="halo.png" alt="Capa do jogo Halo Infinite">
                <p>Halo Infinite</p>
            </article>
            
            <article class="jogo">
                <img src="forza.png" alt="Capa do jogo Forza Horizon 5">
                <p>Forza Horizon 5</p>
            </article>
            
            <article class="jogo">
                <img src="starfiled.jpg" alt="Capa do jogo Starfield">
                <p>Starfield</p>
            </article>
            
            <article class="jogo">
                <img src="Minecraft.png" alt="Capa do jogo Minecraft">
                <p>Minecraft</p>
            </article>
            
            <article class="jogo">
                <img src="sea.jpg" alt="Capa do jogo Sea of Thieves">
                <p>Sea of Thieves</p>
            </article>
            
            <article class="jogo">
                <img src="fr.jpg" alt="Capa do jogo Flight Simulator">
                <p>Flight Simulator</p>
            </article>
        </section>
    </main>
    
    <div class="buttons">
        <a href="index.html" class="btn">Página Inicial</a>
    </div>
</body>
</html>
